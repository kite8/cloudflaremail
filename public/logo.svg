<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" /> <stop offset="100%" stop-color="#818cf8" /> </linearGradient>
    
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="60" cy="60" r="50" fill="none" stroke="url(#mainGrad)" stroke-width="4" filter="url(#neonGlow)"/>

  <g transform="translate(30, 40) scale(0.6)" fill="url(#mainGrad)" filter="url(#neonGlow)">
    <path d="M-10,10 C-30,0 -40,20 -20,40 L0,30 C-10,50 10,60 20,40 L10,20 C30,30 40,10 20,-10 Z" transform="translate(0, 10)"/>
    <path d="M110,10 C130,0 140,20 120,40 L100,30 C110,50 90,60 80,40 L90,20 C70,30 60,10 80,-10 Z" transform="translate(-10, 10) rotate(180, 100, 25)"/>
    <rect x="10" y="15" width="80" height="50" rx="4"/>
    <path d="M10,15 L50,45 L90,15" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <path d="M15,70 L40,70 M10,80 L35,80" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
</svg>
